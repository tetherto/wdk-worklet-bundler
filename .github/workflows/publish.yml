name: Publish
on:
  push:
    tags:
      - v*
permissions:
  id-token: write
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: release
    name: Publish
    steps:
      - uses: holepunchto/actions/node-base@v1
      - run: npm run build
      - uses: holepunchto/actions/publish@v1
